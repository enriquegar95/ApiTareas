version: "3.9"

services:
  db:
    image: postgres:16
    container_name: bd_api_tareas
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
    container_name: api-tareas
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./:/app:rw
    restart: unless-stopped

  migrate:
    build:
      context: .
    container_name: api_tareas_migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: alembic upgrade head
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_api_tareas
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata: